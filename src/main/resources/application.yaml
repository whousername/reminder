server:
  port: 8080

spring:

  application:
    name: Reminder Application

  datasource:
    username: reminder_user
    password: reminder_pass



  jpa:
    hibernate:
      ddl-auto: validate

  liquibase:
    enabled: true
    change-log: db/changelog/master-changelog.xml
    contexts: prod



  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    properties:
      org:
        quartz:
          scheduler:
            instanceName: reminder-scheduler
          threadPool:
            threadCount: 5
          jobStore:
            driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
            useProperties: true